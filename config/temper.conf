# Temper (nice!nano) — shared with macOS + Linux keymap variants

# Mouse pointing (Will relies on this — do not strip)
CONFIG_ZMK_POINTING=y

# Combos (vertical brackets, sticky shift, browser nav, etc.)
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=16
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=4

# BLE range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Deep sleep for battery / travel use
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# BLE name is platform-specific via EXTRA_CONF_FILE in CI:
#   temper_macos.conf → "Temper Mac"
#   temper_linux.conf → "Temper Linux"
# Fallback if built without EXTRA_CONF_FILE:
CONFIG_ZMK_KEYBOARD_NAME="Temper"

# Displays: nice!view via shield stack (nice_view_adapter + nice_view in CI).
# Stock I2C SSD1306 in temper.dtsi stays disabled — nice!view is SPI.
