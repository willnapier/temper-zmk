# Chocofi — same features as Temper keymaps (no nice!view)

CONFIG_ZMK_POINTING=y

CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=16
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=4

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# BLE name platform-specific via EXTRA_CONF_FILE in CI:
#   chocofi_macos.conf → "Chocofi Mac"
#   chocofi_linux.conf → "Chocofi Linux"
# Fallback (still distinct from Temper):
CONFIG_ZMK_KEYBOARD_NAME="Chocofi"

# No display on this pair
CONFIG_ZMK_DISPLAY=n
