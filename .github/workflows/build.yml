name: Build Temper / Chocofi ZMK firmware

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build keyboard firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      # macOS / Cmd variants + nice!view (SPI adapter + display)
      - name: Build left half (macOS)
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="temper_left nice_view_adapter nice_view"
          -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/temper.keymap"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename left firmware (macOS)
        run: cp build/zephyr/zmk.uf2 temper_macos_left.uf2

      - name: Build right half (macOS)
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="temper_right nice_view_adapter nice_view"
          -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/temper.keymap"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename right firmware (macOS)
        run: cp build/zephyr/zmk.uf2 temper_macos_right.uf2

      # Linux / Ctrl variants + nice!view
      - name: Build left half (Linux)
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="temper_left nice_view_adapter nice_view"
          -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/temper_linux.keymap"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename left firmware (Linux)
        run: cp build/zephyr/zmk.uf2 temper_linux_left.uf2

      - name: Build right half (Linux)
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="temper_right nice_view_adapter nice_view"
          -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/temper_linux.keymap"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename right firmware (Linux)
        run: cp build/zephyr/zmk.uf2 temper_linux_right.uf2

      # settings_reset — clears BLE bonds / ZMK settings (flash then re-flash real firmware)
      - name: Build left settings_reset
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="temper_left settings_reset"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename left settings_reset
        run: cp build/zephyr/zmk.uf2 temper_settings_reset_left.uf2

      - name: Build right settings_reset
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="temper_right settings_reset"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename right settings_reset
        run: cp build/zephyr/zmk.uf2 temper_settings_reset_right.uf2

      # ---- Chocofi (same keymaps, no nice!view; distinct BLE name) ----
      - name: Build Chocofi left half (macOS)
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD=chocofi_left
          -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/temper.keymap"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Chocofi left (macOS)
        run: cp build/zephyr/zmk.uf2 chocofi_macos_left.uf2

      - name: Build Chocofi right half (macOS)
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD=chocofi_right
          -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/temper.keymap"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Chocofi right (macOS)
        run: cp build/zephyr/zmk.uf2 chocofi_macos_right.uf2

      - name: Build Chocofi left half (Linux)
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD=chocofi_left
          -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/temper_linux.keymap"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Chocofi left (Linux)
        run: cp build/zephyr/zmk.uf2 chocofi_linux_left.uf2

      - name: Build Chocofi right half (Linux)
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD=chocofi_right
          -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/temper_linux.keymap"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Chocofi right (Linux)
        run: cp build/zephyr/zmk.uf2 chocofi_linux_right.uf2

      - name: Build Chocofi left settings_reset
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="chocofi_left settings_reset"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Chocofi left settings_reset
        run: cp build/zephyr/zmk.uf2 chocofi_settings_reset_left.uf2

      - name: Build Chocofi right settings_reset
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="chocofi_right settings_reset"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Chocofi right settings_reset
        run: cp build/zephyr/zmk.uf2 chocofi_settings_reset_right.uf2

      - name: Upload Temper firmware
        uses: actions/upload-artifact@v4
        with:
          name: temper-firmware
          path: |
            temper_macos_left.uf2
            temper_macos_right.uf2
            temper_linux_left.uf2
            temper_linux_right.uf2
            temper_settings_reset_left.uf2
            temper_settings_reset_right.uf2

      - name: Upload Chocofi firmware
        uses: actions/upload-artifact@v4
        with:
          name: chocofi-firmware
          path: |
            chocofi_macos_left.uf2
            chocofi_macos_right.uf2
            chocofi_linux_left.uf2
            chocofi_linux_right.uf2
            chocofi_settings_reset_left.uf2
            chocofi_settings_reset_right.uf2
