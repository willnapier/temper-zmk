name: Build Temper ZMK firmware

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build Temper firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      # Temper is Mac-only for now (Totem-parity Cmd keymap + nice!view).
      # Linux keymap file kept in-tree for a later swap; not built.
      # Chocofi builds removed (deprecated 2026-07-24).
      - name: Build left half
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="temper_left nice_view_adapter nice_view"
          -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/temper.keymap"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename left firmware
        run: cp build/zephyr/zmk.uf2 temper_left.uf2

      - name: Build right half
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="temper_right nice_view_adapter nice_view"
          -DKEYMAP_FILE="${GITHUB_WORKSPACE}/config/temper.keymap"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename right firmware
        run: cp build/zephyr/zmk.uf2 temper_right.uf2

      # settings_reset — clears BLE bonds / ZMK settings (flash then re-flash real firmware)
      - name: Build left settings_reset
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="temper_left settings_reset"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename left settings_reset
        run: cp build/zephyr/zmk.uf2 temper_settings_reset_left.uf2

      - name: Build right settings_reset
        run: >
          west build --pristine -s zmk/app -b nice_nano_v2 --
          -DSHIELD="temper_right settings_reset"
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename right settings_reset
        run: cp build/zephyr/zmk.uf2 temper_settings_reset_right.uf2

      - name: Upload Temper firmware
        uses: actions/upload-artifact@v4
        with:
          name: temper-firmware
          path: |
            temper_left.uf2
            temper_right.uf2
            temper_settings_reset_left.uf2
            temper_settings_reset_right.uf2
